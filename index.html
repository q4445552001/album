<!DOCTYPE html>

<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
    <script src="./album.js"></script>
    <title>嘎澤的相簿</title>
</head>

<style>
    html,
    body {
        width: 100%;
        height: 100%;
        margin: 0;
        font-family: Microsoft JhengHei;
    }

    .footer {
        position: fixed;
        width: 100%;
        height: 80px;
        background-color: #ccc;
        z-index: 99;
    }

    .albums {
        position: absolute;
        top: 150px;
    }

    body>div {
        padding: 30px;
        text-align: center;
    }


    div.gallery {
        margin: 5px;
        border: 1px solid #ccc;
        display: inline-block;
        width: 300px;
        height: 400px;
        transition: all 1s ease-out;
        background-color: white;
        z-index: 1;
    }

    div.gallery:hover {
        border: 1px solid #777;
        transform: scale(1.4, 1.4);
        z-index: 2;
    }

    div.gallery .img {
        width: auto;
        min-height: 284px;
        display: flex;
        align-items: center;
    }

    div.gallery .img img {
        width: auto;
        height: auto;
        max-width: 300px;
        max-height: 284px;
        margin: auto;
    }

    div.desc {
        padding: 8px;
        text-align: center;
        color: rgba(0, 0, 0, .54);
    }

    a {
        text-decoration: none;
    }

    @media screen and (min-width: 0px) and (max-width: 700px) {
        div.gallery:hover {
            transform: unset;
        }
    }
</style>

<body>
    <div class="footer">
        <p>
            請xd
        </p>
    </div>
    <div class="albums">
        <div id="albums"></div>
    </div>
</body>

</html>

<script>
    // var List = [];
    var PageSize = 12;
    var Page = 0; //初始化頁數
    var ScrollHeight = 0;

    $(init);

    async function init() {
        $(window).off('scroll').on("scroll", async function (e) {
            let self = window.pageYOffset + window.innerHeight;
            if (self >= ScrollHeight) {
                Page++;
                await Get(Page);
                ScrollHeight = $(document).height() - 200;
            }
        });

        await listAlbums();
        ScrollHeight = $(document).height();
    }

    async function listAlbums() {
        $('#albums').empty();

        // var data =
        //     await $.ajax({
        //         type: 'POST',
        //         url: 'http://localhost:8080/getList',
        //         dataType: 'json',
        //         error: (data) => {
        //         }
        //     });

        // List = data;

        Get(Page);
    }


    function Get(size) {
        var $obj = $('#albums');

        var data = List.filter(function (x, i) { return i > size * PageSize && i <= (size * PageSize + PageSize) });

        $.each(data, (i, item) => {
            var html = `
                <div class="gallery">
                    <a target="_blank" href="${item.productUrl}">
                        <div class="img">
                            <img src="${item.coverPhotoBaseUrl == "" ? "./no-image-icon-23494-Windows.ico" : item.coverPhotoBaseUrl}">
                        </div>
                        <div class="desc">(${item.mediaItemsCount} 個項目)</div>
                        <div class="desc">${item.title}<br>${item.Des ?? ""}</div>
                    </a>
                </div>
		`;

            $obj.append(html);
        });
    }
</script>
