<style>
    html,
    body {
        width: 100%;

        overflow-x: hidden;
    }

    .power {
        position: absolute;
        top: 0;

        padding: 10px;

    .footer {
        position: fixed;
        /* width: 100%; */
        height: 98px;
        background-color: #90CAF9;
        z-index: 99;

        top: -48px;

        width: 370px;
        border-bottom-left-radius: 10px;
        border-bottom-right-radius: 10px;

    div.gallery {
        margin: 5px;

    div.gallery .img {
        width: auto;
        min-height: 284px;
        display: flex;
        align-items: center;
    }

    div.gallery .img img {
        width: auto;
        height: auto;
        max-width: 300px;
        max-height: 284px;
        margin: auto;
    }

    div.desc {
        padding: 8px;
        text-align: center;
        color: rgba(0, 0, 0, .54);
    }

    a {
        text-decoration: none;
    }

    .footer p {
        font-size: 16px;
        width: calc(100% - 10px);
        margin: 5px;
    }

    @media screen and (max-width: 700px) {
        .footer {
            top: 0px;
        }

        div.gallery:hover {
            transform: unset;
        }
    }
</style>

<script>
    // var List = [];
    var PageSize = 18;
    var Page = 0; //初始化頁數
    var ScrollHeight = 0;

    $(init);

    async function init() {
        $(window).off('scroll').on("scroll", async function (e) {
            let self = window.pageYOffset + window.innerHeight;
            if (self >= ScrollHeight) {
                Page++;
                await Get(Page);
                ScrollHeight = $(document).height() - 200;
            }
        });

        await listAlbums();
        ScrollHeight = $(document).height();
    }

    async function listAlbums() {
        $('#albums').empty();

        // var data =
        //     await $.ajax({
        //         type: 'POST',
        //         url: 'http://localhost:8080/getList',
        //         dataType: 'json',
        //         error: (data) => {
        //         }
        //     });

        // List = data;

        Get(Page);
    }


    function Get(size) {
        var $obj = $('#albums');

        var data = List.filter(function (x, i) { return i >= size * PageSize && i < (size * PageSize + PageSize) });

        $.each(data, (i, item) => {
            var html = `
                <div class="gallery">
                    <a target="_blank" href="${item.productUrl == "" ? "#" : item.productUrl}">
                        <div class="img">
                            <img src="${item.coverPhotoBaseUrl == "" ? "./icon/no-image-icon-23494-Windows.ico" : item.coverPhotoBaseUrl}">
                        </div>
                        <div class="desc">(${item.mediaItemsCount} 個項目)</div>
                        <div class="desc">${item.title}<br>${item.Des ?? ""}</div>
                    </a>
                </div>
		`;

            $obj.append(html);
        });
    }
</script>
